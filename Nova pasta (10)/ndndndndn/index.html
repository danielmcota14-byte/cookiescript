<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookieScript IDE - Plataforma Completa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Header estilo GitHub */
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            height: 60px;
        }
        
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #f0f6fc;
        }
        
        .logo span {
            color: #f78166;
        }
        
        .search-box {
            flex: 1;
            max-width: 300px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 6px 12px;
            color: #e6edf3;
        }
        
        .toolbar {
            display: flex;
            gap: 8px;
        }
        
        .toolbar button, .toolbar select {
            padding: 6px 12px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .toolbar button:hover {
            background: #30363d;
        }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #238636;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Layout principal */
        .main {
            display: flex;
            height: calc(100vh - 60px);
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #161b22;
            border-right: 1px solid #30363d;
            overflow-y: auto;
        }
        
        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid #30363d;
        }
        
        .sidebar-section h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 12px;
        }
        
        .file-item, .repo-item, .project-item {
            padding: 8px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .file-item:hover, .repo-item:hover, .project-item:hover {
            background: #21262d;
        }
        
        /* Editor */
        .editor {
            flex: 2;
            display: flex;
            flex-direction: column;
            background: #0d1117;
        }
        
        .tabs {
            display: flex;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding-left: 8px;
            gap: 4px;
        }
        
        .tab {
            padding: 8px 16px;
            background: #0d1117;
            border: none;
            color: #c9d1d9;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }
        
        .tab.active {
            background: #21262d;
            color: #2f81f7;
        }
        
        .tab-close {
            cursor: pointer;
            opacity: 0.6;
        }
        
        .editor-content {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .file-path {
            display: flex;
            gap: 8px;
        }
        
        .file-path input {
            flex: 1;
            padding: 8px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
        }
        
        textarea {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 12px;
            resize: none;
        }
        
        /* Painel direito */
        .panel {
            width: 350px;
            background: #161b22;
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        
        .panel-tabs {
            display: flex;
            padding: 8px 12px;
            gap: 8px;
            border-bottom: 1px solid #30363d;
        }
        
        .panel-tab-btn {
            padding: 6px 12px;
            background: #21262d;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .panel-tab-btn.active {
            background: #2f81f7;
            color: white;
        }
        
        .panel-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        
        .panel-tab {
            display: none;
        }
        
        .panel-tab.active {
            display: block;
        }
        
        textarea.prompt {
            width: 100%;
            min-height: 100px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            padding: 8px;
            margin-bottom: 12px;
        }
        
        .output {
            background: #0d1117;
            color: #7ee787;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .repo-card {
            background: #21262d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .repo-card:hover {
            background: #30363d;
        }
        
        .repo-name {
            color: #2f81f7;
            font-weight: bold;
        }
        
        button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        button.primary {
            background: #238636;
            border-color: #238636;
        }
        
        input, select, textarea {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #161b22;
            border-radius: 12px;
            width: 450px;
            border: 1px solid #30363d;
        }
        
        .modal-header, .modal-footer {
            padding: 16px;
            border-bottom: 1px solid #30363d;
        }
        
        .modal-footer {
            border-bottom: none;
            border-top: 1px solid #30363d;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        
        .modal-body {
            padding: 16px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 8px;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #238636;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1100;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🍪 Cookie<span>Script</span> IDE</div>
        <input type="text" class="search-box" id="globalSearch" placeholder="Pesquisar repositórios...">
        <div class="toolbar">
            <button id="newBtn">Novo</button>
            <button id="openBtn">Abrir</button>
            <button id="saveBtn">Salvar</button>
            <button id="runBtn">Executar</button>
            <select id="langSelect">
                <option value="cookiescript">CookieScript</option>
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
            </select>
        </div>
        <div class="avatar" id="avatarBtn">U</div>
    </div>
    
    <div class="main">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>📁 Arquivos Locais</h3>
                <div id="fileList">Carregando...</div>
            </div>
            <div class="sidebar-section">
                <h3>📦 Meus Repositórios</h3>
                <button id="newRepoBtn" style="width:100%; margin-bottom:12px;">+ Novo Repositório</button>
                <div id="repoList">Carregando...</div>
            </div>
            <div class="sidebar-section">
                <h3>📦 Projetos</h3>
                <input type="text" id="projName" placeholder="Nome" style="width:100%; margin-bottom:6px; padding:6px;">
                <textarea id="projDesc" placeholder="Descrição" rows="2" style="width:100%; margin-bottom:6px; padding:6px;"></textarea>
                <button id="createProjBtn" style="width:100%; margin-bottom:12px;">Criar Projeto</button>
                <div id="projList">Carregando...</div>
            </div>
            <div class="sidebar-section">
                <h3>🔧 Git</h3>
                <button id="gitStatusBtn" style="width:100%; margin-bottom:6px;">Status</button>
                <input type="text" id="commitMsg" placeholder="Mensagem" style="width:100%; margin-bottom:6px; padding:6px;">
                <button id="gitCommitBtn" style="width:100%;">Commit</button>
            </div>
        </div>
        
        <!-- Editor -->
        <div class="editor">
            <div class="tabs" id="tabsContainer"></div>
            <div class="editor-content">
                <div class="file-path">
                    <span>📄</span>
                    <input type="text" id="filePathInput" placeholder="caminho/do/arquivo.cookiescript">
                </div>
                <textarea id="codeEditor" placeholder="Escreva seu código aqui..."></textarea>
            </div>
        </div>
        
        <!-- Painel Direito -->
        <div class="panel">
            <div class="panel-tabs">
                <button class="panel-tab-btn active" data-tab="ai">🤖 IA</button>
                <button class="panel-tab-btn" data-tab="search">🔍 Busca</button>
                <button class="panel-tab-btn" data-tab="output">📋 Saída</button>
                <button class="panel-tab-btn" data-tab="explore">🌍 Explorar</button>
            </div>
            <div class="panel-content">
                <div id="tab-ai" class="panel-tab active">
                    <label>🤖 Gerar código com IA</label>
                    <textarea id="aiPrompt" class="prompt" placeholder="Descreva o código que você quer gerar..."></textarea>
                    <button id="generateBtn" style="width:100%;">Gerar Código</button>
                </div>
                <div id="tab-search" class="panel-tab">
                    <label>🔍 Pesquisar exemplos</label>
                    <div style="display:flex; gap:8px; margin-bottom:12px;">
                        <input type="text" id="searchInput" placeholder="Ex: operações com arquivos" style="flex:1;">
                        <button id="searchBtn">Buscar</button>
                    </div>
                    <div id="searchResults"></div>
                </div>
                <div id="tab-output" class="panel-tab">
                    <div class="output" id="outputArea">✅ CookieScript IDE pronta!</div>
                </div>
                <div id="tab-explore" class="panel-tab">
                    <label>🌟 Repositórios Públicos</label>
                    <div id="exploreList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal Novo Repositório -->
    <div id="repoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Criar repositório</h3>
                <span style="cursor:pointer" id="closeModalBtn">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nome *</label>
                    <input type="text" id="repoNameInput">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="repoDescInput" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>Visibilidade</label>
                    <select id="repoVisInput">
                        <option value="public">Público</option>
                        <option value="private">Privado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Linguagem</label>
                    <select id="repoLangInput">
                        <option>CookieScript</option>
                        <option>Python</option>
                        <option>JavaScript</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancelModalBtn">Cancelar</button>
                <button id="confirmModalBtn" style="background:#238636;">Criar</button>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script type="module">
        // ==================== FIREBASE ====================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
        import { getAuth, signInAnonymously, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAc4-Mg31Vo-uL1UjeyxM0prrTcdd9YlX0",
            authDomain: "nibtrader-52b9a.firebaseapp.com",
            databaseURL: "https://nibtrader-52b9a-default-rtdb.firebaseio.com",
            projectId: "nibtrader-52b9a",
            storageBucket: "nibtrader-52b9a.firebasestorage.app",
            messagingSenderId: "859734884174",
            appId: "1:859734884174:web:60d74496bd279bea28e81f"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);
        
        // ==================== ESTADO GLOBAL ====================
        let currentUser = null;
        let repositoriosDoUsuario = [];
        let arquivosLocais = [];
        
        // ==================== FUNÇÕES AUXILIARES ====================
        function showToast(msg, tipo = 'sucesso') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = tipo === 'sucesso' ? '#238636' : '#da3633';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
        
        function addOutput(texto) {
            const output = document.getElementById('outputArea');
            const timestamp = new Date().toLocaleTimeString();
            output.textContent = `[${timestamp}] ${texto}\n\n` + output.textContent;
            if (output.textContent.length > 5000) {
                output.textContent = output.textContent.substring(0, 5000);
            }
        }
        
        // ==================== API LOCAL (CookieScript Backend) ====================
        async function apiCall(endpoint, data) {
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await res.json();
            } catch (err) {
                return { success: false, error: err.message };
            }
        }
        
        // ==================== ARQUIVOS LOCAIS ====================
        async function carregarArquivosLocais() {
            const res = await apiCall('/api/files', {});
            const container = document.getElementById('fileList');
            if (res.success && res.files) {
                arquivosLocais = res.files;
                container.innerHTML = '';
                res.files.forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.textContent = file;
                    div.onclick = () => abrirArquivoLocal(file);
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = '<div style="color:#f38ba8;">Erro ao carregar</div>';
            }
        }
        
        async function abrirArquivoLocal(nome) {
            const res = await apiCall('/api/open', { path: nome });
            if (res.success) {
                document.getElementById('filePathInput').value = nome;
                document.getElementById('codeEditor').value = res.content;
                addOutput(`📂 Aberto: ${nome}`);
                showToast(`Aberto: ${nome}`);
            } else {
                addOutput(`❌ Erro: ${res.error}`);
            }
        }
        
        async function salvarArquivoLocal() {
            const path = document.getElementById('filePathInput').value || 'untitled.cookiescript';
            const content = document.getElementById('codeEditor').value;
            const res = await apiCall('/api/save', { path, content });
            if (res.success) {
                addOutput(`💾 Salvo: ${path}`);
                showToast(`Salvo: ${path}`);
                carregarArquivosLocais();
            } else {
                addOutput(`❌ Erro: ${res.error}`);
            }
        }
        
        async function executarCodigo() {
            const code = document.getElementById('codeEditor').value;
            const lang = document.getElementById('langSelect').value;
            if (!code.trim()) {
                addOutput('⚠️ Código vazio');
                return;
            }
            addOutput(`🚀 Executando (${lang})...`);
            const res = await apiCall('/api/execute', { code, language: lang });
            if (res.success) {
                addOutput(`✅ ${res.output || 'Executado com sucesso!'}`);
                showToast('Código executado');
            } else {
                addOutput(`❌ ${res.error}`);
            }
        }
        
        async function gerarCodigoIA() {
            const prompt = document.getElementById('aiPrompt').value;
            const lang = document.getElementById('langSelect').value;
            if (!prompt.trim()) {
                addOutput('⚠️ Digite um prompt');
                return;
            }
            addOutput(`🤖 Gerando código com IA...`);
            const res = await apiCall('/api/generate', { prompt, language: lang });
            if (res.success) {
                document.getElementById('codeEditor').value = res.code;
                addOutput(`✅ Código gerado!`);
                showToast('Código gerado');
            } else {
                addOutput(`❌ ${res.error}`);
            }
        }
        
        async function pesquisarExemplos() {
            const query = document.getElementById('searchInput').value;
            if (!query.trim()) {
                addOutput('⚠️ Digite uma consulta');
                return;
            }
            addOutput(`🔍 Buscando: ${query}`);
            const res = await apiCall('/api/search', { query, language: 'cookiescript' });
            const container = document.getElementById('searchResults');
            if (res.success && res.results) {
                container.innerHTML = '';
                if (res.results.length === 0) {
                    container.innerHTML = '<div>Nenhum resultado</div>';
                }
                res.results.forEach(r => {
                    const div = document.createElement('div');
                    div.style.cssText = 'padding: 10px; margin-bottom: 8px; background: #21262d; border-radius: 6px; cursor: pointer;';
                    div.innerHTML = `<strong>${r.file}</strong><br><small>${(r.preview || '').substring(0, 100)}...</small>`;
                    div.onclick = () => abrirArquivoLocal(r.file);
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = `<div style="color:#f38ba8;">Erro: ${res.error || 'Falha'}</div>`;
            }
        }
        
        // ==================== PROJETOS LOCAIS ====================
        async function carregarProjetos() {
            const res = await apiCall('/api/load_projects', {});
            const container = document.getElementById('projList');
            if (res.success && res.projects) {
                const projetos = Object.values(res.projects);
                container.innerHTML = '';
                if (projetos.length === 0) {
                    container.innerHTML = '<div>Nenhum projeto</div>';
                }
                projetos.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'project-item';
                    div.innerHTML = `<strong>${p.name}</strong><br><small>${p.description || ''}</small>`;
                    div.onclick = () => carregarProjeto(p.id);
                    container.appendChild(div);
                });
            }
        }
        
        async function criarProjeto() {
            const nome = document.getElementById('projName').value;
            const desc = document.getElementById('projDesc').value;
            if (!nome) {
                addOutput('⚠️ Digite um nome para o projeto');
                return;
            }
            const res = await apiCall('/api/create_project', { name: nome, description: desc });
            if (res.success) {
                addOutput(`✅ Projeto criado: ${nome}`);
                showToast(`Projeto: ${nome}`);
                carregarProjetos();
                document.getElementById('projName').value = '';
                document.getElementById('projDesc').value = '';
            } else {
                addOutput(`❌ ${res.error}`);
            }
        }
        
        async function carregarProjeto(id) {
            const res = await apiCall('/api/load_project', { project_id: id });
            if (res.success && res.project) {
                addOutput(`📦 Projeto: ${res.project.name}`);
                const files = res.project.files || {};
                const primeiro = Object.keys(files)[0];
                if (primeiro) {
                    document.getElementById('codeEditor').value = files[primeiro];
                    document.getElementById('filePathInput').value = primeiro;
                }
                showToast(`Projeto ${res.project.name} carregado`);
            }
        }
        
        // ==================== GIT LOCAL ====================
        async function gitStatus() {
            const res = await apiCall('/api/git_status', {});
            addOutput(`📊 Git:\n${res.status || res.error || 'OK'}`);
        }
        
        async function gitCommit() {
            const msg = document.getElementById('commitMsg').value;
            if (!msg) {
                addOutput('⚠️ Digite uma mensagem');
                return;
            }
            const res = await apiCall('/api/git_commit', { message: msg });
            if (res.success) {
                addOutput(`✅ Commit: ${msg}`);
                document.getElementById('commitMsg').value = '';
                showToast('Commit realizado');
            } else {
                addOutput(`❌ ${res.error}`);
            }
        }
        
        // ==================== REPOSITÓRIOS FIREBASE ====================
        async function carregarRepositorios() {
            if (!currentUser) return;
            
            const snapshot = await get(ref(database, 'repositories'));
            const meusRepos = [];
            
            if (snapshot.exists()) {
                const dados = snapshot.val();
                for (let id in dados) {
                    if (dados[id].ownerId === currentUser.uid) {
                        meusRepos.push({ id, ...dados[id] });
                    }
                }
            }
            
            repositoriosDoUsuario = meusRepos;
            const container = document.getElementById('repoList');
            
            if (meusRepos.length === 0) {
                container.innerHTML = '<div>Nenhum repositório</div>';
                return;
            }
            
            container.innerHTML = meusRepos.map(repo => `
                <div class="repo-item" data-id="${repo.id}">
                    <strong>📁 ${repo.name}</strong>
                    <div style="font-size:11px; color:#8b949e;">${repo.visibility === 'public' ? '🌍 Público' : '🔒 Privado'}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.repo-item').forEach(el => {
                el.addEventListener('click', () => abrirRepositorio(el.dataset.id));
            });
        }
        
        async function carregarRepositoriosPublicos() {
            const snapshot = await get(ref(database, 'repositories'));
            const publicos = [];
            
            if (snapshot.exists()) {
                const dados = snapshot.val();
                for (let id in dados) {
                    if (dados[id].visibility === 'public') {
                        publicos.push({ id, ...dados[id] });
                    }
                }
            }
            
            const container = document.getElementById('exploreList');
            
            if (publicos.length === 0) {
                container.innerHTML = '<div>Nenhum repositório público</div>';
                return;
            }
            
            container.innerHTML = publicos.map(repo => `
                <div class="repo-card" data-id="${repo.id}">
                    <div class="repo-name">${repo.ownerName || 'Usuário'}/${repo.name}</div>
                    <div style="font-size:12px; margin:8px 0;">${repo.description || 'Sem descrição'}</div>
                    <div style="font-size:11px;">⭐ ${repo.stars || 0} stars</div>
                </div>
            `).join('');
            
            document.querySelectorAll('#exploreList .repo-card').forEach(el => {
                el.addEventListener('click', () => visualizarRepositorioPublico(el.dataset.id));
            });
        }
        
        async function criarRepositorio(nome, desc, visibilidade, linguagem) {
            if (!nome) {
                showToast('Nome obrigatório', 'erro');
                return false;
            }
            
            const repoId = `repo_${Date.now()}_${Math.random().toString(36).substring(2, 8)}`;
            const repoData = {
                name: nome,
                description: desc,
                visibility: visibilidade,
                language: linguagem,
                ownerId: currentUser.uid,
                ownerName: currentUser.displayName || 'Usuário',
                stars: 0,
                forks: 0,
                createdAt: Date.now(),
                updatedAt: Date.now(),
                files: {
                    'README.md': `# ${nome}\n\n${desc || 'Projeto criado com CookieScript IDE!'}\n\n## Sobre\nEste repositório foi criado diretamente pela IDE.`
                }
            };
            
            try {
                await set(ref(database, `repositories/${repoId}`), repoData);
                showToast(`Repositório "${nome}" criado!`);
                addOutput(`🎉 Repositório criado: ${nome}`);
                await carregarRepositorios();
                await carregarRepositoriosPublicos();
                return true;
            } catch (err) {
                showToast(`Erro: ${err.message}`, 'erro');
                return false;
            }
        }
        
        async function abrirRepositorio(repoId) {
            const snapshot = await get(ref(database, `repositories/${repoId}`));
            if (snapshot.exists()) {
                const repo = snapshot.val();
                addOutput(`📦 Abrindo repositório: ${repo.name}`);
                showToast(`Abrindo ${repo.name}`);
                
                const files = repo.files || {};
                const primeiro = Object.keys(files)[0];
                if (primeiro) {
                    document.getElementById('codeEditor').value = files[primeiro];
                    document.getElementById('filePathInput').value = primeiro;
                }
            }
        }
        
        async function visualizarRepositorioPublico(repoId) {
            const snapshot = await get(ref(database, `repositories/${repoId}`));
            if (snapshot.exists()) {
                const repo = snapshot.val();
                addOutput(`👀 Visualizando: ${repo.ownerName}/${repo.name}`);
                
                const novasStars = (repo.stars || 0) + 1;
                await update(ref(database, `repositories/${repoId}`), { stars: novasStars });
                
                const files = repo.files || {};
                const primeiro = Object.keys(files)[0];
                if (primeiro) {
                    document.getElementById('codeEditor').value = files[primeiro];
                    document.getElementById('filePathInput').value = primeiro;
                }
                
                showToast(`⭐ Você deu uma estrela em ${repo.name}`);
            }
        }
        
        function configurarBuscaGlobal() {
            const searchInput = document.getElementById('globalSearch');
            searchInput.addEventListener('input', async (e) => {
                const termo = e.target.value.toLowerCase();
                if (!termo) {
                    carregarRepositorios();
                    return;
                }
                
                const filtrados = repositoriosDoUsuario.filter(repo => 
                    repo.name.toLowerCase().includes(termo)
                );
                
                const container = document.getElementById('repoList');
                if (filtrados.length === 0) {
                    container.innerHTML = '<div>Nenhum resultado</div>';
                    return;
                }
                
                container.innerHTML = filtrados.map(repo => `
                    <div class="repo-item" data-id="${repo.id}">
                        <strong>📁 ${repo.name}</strong>
                        <div style="font-size:11px;">${repo.visibility === 'public' ? '🌍 Público' : '🔒 Privado'}</div>
                    </div>
                `).join('');
                
                document.querySelectorAll('.repo-item').forEach(el => {
                    el.addEventListener('click', () => abrirRepositorio(el.dataset.id));
                });
            });
        }
        
        // ==================== AUTENTICAÇÃO ====================
        async function iniciarAuth() {
            try {
                const userCred = await signInAnonymously(auth);
                currentUser = userCred.user;
                await updateProfile(currentUser, {
                    displayName: `Dev_${currentUser.uid.substring(0, 6)}`
                });
                document.querySelector('.avatar').textContent = currentUser.displayName.charAt(0).toUpperCase();
                showToast('Conectado ao Firebase!');
                addOutput('🔐 Autenticado com sucesso no Firebase');
                
                await carregarRepositorios();
                await carregarRepositoriosPublicos();
                configurarBuscaGlobal();
            } catch (err) {
                addOutput(`❌ Erro na autenticação: ${err.message}`);
            }
        }
        
        // ==================== UI / TABS ====================
        function trocarPainelTab(tabId) {
            document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
        }
        
        // ==================== INICIALIZAÇÃO ====================
        document.getElementById('newBtn').onclick = () => {
            document.getElementById('codeEditor').value = '';
            document.getElementById('filePathInput').value = '';
            addOutput('📄 Novo arquivo criado');
        };
        document.getElementById('openBtn').onclick = () => {
            const nome = prompt('Nome do arquivo:');
            if (nome) abrirArquivoLocal(nome);
        };
        document.getElementById('saveBtn').onclick = salvarArquivoLocal;
        document.getElementById('runBtn').onclick = executarCodigo;
        document.getElementById('generateBtn').onclick = gerarCodigoIA;
        document.getElementById('searchBtn').onclick = pesquisarExemplos;
        document.getElementById('createProjBtn').onclick = criarProjeto;
        document.getElementById('gitStatusBtn').onclick = gitStatus;
        document.getElementById('gitCommitBtn').onclick = gitCommit;
        
        // Modal de repositório
        document.getElementById('newRepoBtn').onclick = () => {
            document.getElementById('repoModal').classList.add('active');
        };
        document.getElementById('closeModalBtn').onclick = () => {
            document.getElementById('repoModal').classList.remove('active');
        };
        document.getElementById('cancelModalBtn').onclick = () => {
            document.getElementById('repoModal').classList.remove('active');
        };
        document.getElementById('confirmModalBtn').onclick = async () => {
            const nome = document.getElementById('repoNameInput').value;
            const desc = document.getElementById('repoDescInput').value;
            const vis = document.getElementById('repoVisInput').value;
            const lang = document.getElementById('repoLangInput').value;
            await criarRepositorio(nome, desc, vis, lang);
            document.getElementById('repoModal').classList.remove('active');
            document.getElementById('repoNameInput').value = '';
            document.getElementById('repoDescInput').value = '';
        };
        
        // Tabs do painel
        document.querySelectorAll('.panel-tab-btn').forEach(btn => {
            btn.onclick = () => trocarPainelTab(btn.dataset.tab);
        });
        
        document.getElementById('avatarBtn').onclick = () => {
            addOutput(`👤 Usuário: ${currentUser?.displayName || 'Anônimo'}`);
            addOutput(`🆔 ID: ${currentUser?.uid || 'N/A'}`);
        };
        
        // Carregar tudo
        carregarArquivosLocais();
        carregarProjetos();
        iniciarAuth();
        addOutput('🍪 CookieScript IDE + Firebase integrados!');
        addOutput('💡 Funcionalidades: Editor + Repositórios + Projetos + Git + IA');
    </script>
</body>
</html>
