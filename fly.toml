# fly.toml - Configuração para Fly.io

app = "cookiescript-ide"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"
  DEEPSEEK_USE_CPU = "1"
  DEEPSEEK_LAZY_LOAD = "1"
  # Descomente a linha abaixo para desativar a IA local (fallback para API)
  # DISABLE_LOCAL_AI = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "180s"      # ← aumentado para 3 minutos (era 120s)
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "8gb"               # ← aumentado para 8GB (era 4gb)
  cpu_kind = "shared"
  cpus = 2