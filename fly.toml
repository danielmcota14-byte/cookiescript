app = "cookiescript-ide"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"
  DISABLE_LOCAL_AI = "false"
  DEEPSEEK_USE_CPU = "1"
  DEEPSEEK_LAZY_LOAD = "1"
  GROQ_API_KEY = "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"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "8gb"
  cpu_kind = "performance"
  cpus = 4
