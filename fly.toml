# fly.toml - Configuração para Fly.io (plano gratuito 4GB RAM)

app = "cookiescript-ide"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"
  DEEPSEEK_USE_CPU = "1"
  DEEPSEEK_LAZY_LOAD = "1"
  # Modelo mais leve para caber em 4GB (phi-2 ~1.5GB em float16)
  DEEPSEEK_MODEL = "microsoft/phi-2"
  # Desative a IA local se ainda houver problemas de memória/inicialização
  # DISABLE_LOCAL_AI = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "300s"      # ← 5 minutos para inicializar
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "4gb"               # máximo do plano gratuito
  cpu_kind = "shared"
  cpus = 2