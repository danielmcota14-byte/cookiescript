# fly.toml - Configuração para Fly.io
# Deploy: fly launch (primeira vez) ou fly deploy (atualizações)

app = "cookiescript-ide"
primary_region = "gru"  # São Paulo - mais próximo do Brasil

[build]
  # Usa Python nativo sem Docker
  builder = "paketobuildpacks/builder:base"
  buildpacks = ["gcr.io/buildpacks/builder:v1"]

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
