# fly.toml - Configuração para Fly.io (plano gratuito 4GB RAM)
# Com IA local DESATIVADA para garantir inicialização rápida

app = "cookiescript-ide"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"
  DEEPSEEK_USE_CPU = "1"
  DEEPSEEK_LAZY_LOAD = "1"
  # DESATIVA COMPLETAMENTE A IA LOCAL - evita carregar torch/transformers
  DISABLE_LOCAL_AI = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "60s"      # com IA desativada, 60s é mais que suficiente
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 2