# fly.toml - Configuração para Fly.io (respeitando limite de 4GB RAM)

app = "cookiescript-ide"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"
  DEEPSEEK_USE_CPU = "1"
  DEEPSEEK_LAZY_LOAD = "1"

  # OPÇÃO 1: Usar modelo mais leve (phi-2 ~1.5GB) – recomendado
  DEEPSEEK_MODEL = "microsoft/phi-2"

  # OPÇÃO 2: Desabilitar IA local completamente (usa apenas Groq/Gemini)
  # Descomente a linha abaixo se preferir esta opção
  # DISABLE_LOCAL_AI = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "180s"      # 3 minutos para carregar o modelo
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "4gb"               # Máximo permitido no plano gratuito/standard
  cpu_kind = "shared"
  cpus = 2